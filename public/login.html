<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EngDoc | Login</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    h1 {
      margin-bottom: 5px;
      color: #0f172a;
    }

    p {
      margin-bottom: 20px;
      color: #64748b;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .field input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    #error {
      margin-top: 12px;
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>EngDoc</h1>
    <p>Faça login para acessar o sistema</p>

    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" required />
      </div>

      <div class="field">
        <label>Senha</label>
        <input id="password" type="password" required />
      </div>

      <button type="submit">Entrar</button>
      <div id="error"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const error = document.getElementById("error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          error.textContent = data.error || "Erro ao logar";
          return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        window.location.href = "/app";

      } catch (err) {
        error.textContent = "Erro de conexão com servidor";
      }
    });
  </script>

</body>
</html>
